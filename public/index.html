<!DOCTYPE html>
<html lang="he">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="64x64" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="אפליקציה לתכנון טיולים חכם — מסלולים, יעדים, לינה ועוד" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trip Planner" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>תכנן את מסלול הטיול שלך</title>
    <script id="react-dotenv" src="%PUBLIC_URL%/env.js"></script>
  </head>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #splash-icon {
      font-size: 72px;
      margin-bottom: 16px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #splash-title {
      color: white;
      font-family: 'Rubik', 'Heebo', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    #splash-sub {
      color: rgba(255,255,255,0.75);
      font-family: 'Rubik', 'Heebo', sans-serif;
      font-size: 14px;
    }
    #splash-dots {
      margin-top: 40px;
      display: flex;
      gap: 8px;
    }
    #splash-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: bounce 1.2s ease-in-out infinite;
    }
    #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    #splash-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-6px); opacity: 1; }
    }
  </style>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="splash">
      <div id="splash-icon">✈️</div>
      <div id="splash-title">Trip Planner</div>
      <div id="splash-sub">תכנן את הטיול המושלם שלך</div>
      <div id="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>

    <script>
      window.__hideSplash = function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hide');
          setTimeout(function() { splash.remove(); }, 500);
        }
      };
      // הסתר אחרי 4 שניות מקסימום (גיבוי)
      setTimeout(window.__hideSplash, 4000);
    </script>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
